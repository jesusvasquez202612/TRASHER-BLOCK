<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasher-Block | VIP</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 40px 0; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 15px #fff; }
        .bot-tag { color: #fff; margin-bottom: 30px; display: block; font-weight: bold; text-shadow: 0 0 8px #fff; }
        
        /* Tarjeta con brillo neón como la foto */
        .card { 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid #fff; 
            border-radius: 25px; 
            padding: 30px; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            margin-bottom: 30px;
        }
        h2 { border-bottom: 1px solid rgba(255, 255, 255, 0.3); padding-bottom: 15px; font-size: 1.4rem; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .price { color: #00ff88; font-weight: bold; }

        /* Botones de Dueños ovalados */
        .owners { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-owner { 
            background: #000; 
            border: 2px solid #fff; 
            border-radius: 50px; 
            padding: 12px; 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: bold; 
        }

        /* Botón de Acceso brillante */
        .btn-main { 
            background: #fff; 
            color: #000; 
            padding: 18px; 
            border-radius: 50px; 
            display: block; 
            margin-top: 40px; 
            text-decoration: none; 
            font-weight: 900; 
            box-shadow: 0 0 30px #fff; 
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <h1>Trasher-Block</h1>
        <span class="bot-tag">@TrasherBlock_bot</span>
        <div class="card">
            <h2>🏆 PLAN VIP (30s)</h2>
            <div class="item"><span>01 Crédito</span> <span class="price">S/ 10.00</span></div>
            <div class="item"><span>04 Créditos</span> <span class="price">S/ 40.00</span></div>
            <div class="item"><span>06 Créditos</span> <span class="price">S/ 60.00</span></div>
            <div class="item"><span>10 Créditos</span> <span class="price">S/ 100.00</span></div>
            <div class="item"><span>12 Créditos</span> <span class="price">S/ 120.00</span></div>
            <div class="item"><span>20 Créditos</span> <span class="price">S/ 200.00</span></div>
        </div>
        <div class="owners">
            <a href="https://t.me/Angel_dox1" class="btn-owner">Dueño 1</a>
            <a href="https://t.me/hitler_dm" class="btn-owner">Dueño 2</a>
        </div>
        <a href="https://t.me/TrasherBlock_bot" class="btn-main">ACCEDER AL SISTEMA</a>
    </div>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#ffffff" },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
